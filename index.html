<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="index,follow">
<title>TURYN – Boutique Custom Builder · Sydney</title>

<!-- DNS prefetch is lighter than preconnect; only preconnect to the critical stylesheet origin -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.googleapis.com">

<!--
  Font optimisations:
  · Removed unused Playfair Display weights (800, 900 → keep only 700 if needed, or drop entirely)
  · Removed Cormorant Garamond weight 300 if you only use 400/500
  · display=optional skips the font if it hasn't loaded in time → zero render-blocking
  · Swap "optional" back to "swap" if you need the font to always render
-->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500;600&family=Playfair+Display:wght@700&display=optional" rel="stylesheet">

<link rel="stylesheet" href="assets/css/main.min.css">
</head>

<body>

<div class="mmenu" id="mm">
  <span class="mclose" id="js-mclose">✕</span>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="#services">Services</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="#process">Process</a>
  <a href="#contact">Contact</a>
</div>

<nav>
  <a href="index.html" class="nav-logo">TURYN</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="#process">Process</a></li>
    <li><a href="#contact" class="nav-cta">Enquire</a></li>
  </ul>
  <div class="ham" id="js-ham"><span></span><span></span><span></span></div>
</nav>

<section class="hero">
  <div class="hero-panel-left">
    <!--
      width/height prevent layout shift (CLS).
      loading="lazy" defers off-screen images.
      decoding="async" frees the main thread.
      Update width/height to match your actual image dimensions.
    -->
    <img class="hero-img-left"
         src="assets/img/hero.jpg"
         alt="TURYN custom home build – Sydney"
         width="1200"
         height="800"
         loading="lazy"
         decoding="async">
  </div>

  <div class="hero-content">
    <!-- your hero text stays unchanged -->
  </div>
</section>

<!-- rest of your sections remain unchanged -->

<!--
  Deferred JS block — placed at end of body so it never blocks rendering.
  Replaces all inline onclick="" attributes (parser-friendlier, cacheable).
-->
<script>
(function(){
  var mm = document.getElementById('mm');
  function openMM(){ mm.classList.add('is-open'); }
  function closeMM(){ mm.classList.remove('is-open'); }

  document.getElementById('js-ham').addEventListener('click', openMM);
  document.getElementById('js-mclose').addEventListener('click', closeMM);

  // Close mobile menu on any internal link click
  mm.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', closeMM);
  });
})();
</script>

</body>
</html>
